name: Release

# Declenche un build + release complet des qu'un tag vX.Y.Z est pousse.
# Le tag doit correspondre exactement a la version du package.json.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # necessaire pour creer la release et uploader les assets

jobs:
  release:
    name: Build & publish installer
    runs-on: windows-latest
    timeout-minutes: 30

    # Expose le secret au niveau job pour qu il soit accessible via env.X dans les if:
    # (GitHub Actions n autorise pas secrets.X dans un if: de step pour des raisons
    # de masking, il faut passer par env).
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Install npm dependencies
        run: npm ci

      - name: Build agent.exe (PyInstaller)
        run: npm run build:agent

      - name: Build Electron installer + portable (no publish)
        env:
          # Pas de signature directe par electron-builder : on passe par SignPath Foundation
          # apres-coup (step "Sign installers with SignPath" plus bas).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # --publish never : on laisse la step suivante publier la release
        # (electron-builder creerait sinon une release en mode draft).
        run: npx electron-builder --win --publish never

      - name: List build artefacts
        shell: bash
        run: ls -lh dist/

      # ── Signature SignPath Foundation (conditionnel) ─────────────────────
      # Active des que les secrets + variables SignPath sont configures dans
      # le repo (Settings > Secrets and variables > Actions).
      # Si absents, le workflow continue sans signer (release non signee).
      - name: Upload unsigned installers for SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installers
          path: |
            dist/AgentDockyard-Setup-*.exe
            dist/AgentDockyard-Portable-*.exe
          retention-days: 1
          if-no-files-found: error

      - name: Sign installers with SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        id: signpath-sign
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ./signed

      - name: Replace unsigned installers with signed versions
        if: env.SIGNPATH_API_TOKEN != ''
        shell: bash
        run: |
          ls -lh ./signed/
          cp ./signed/AgentDockyard-Setup-*.exe dist/ 2>/dev/null || true
          cp ./signed/AgentDockyard-Portable-*.exe dist/ 2>/dev/null || true
          echo "--- dist/ apres remplacement ---"
          ls -lh dist/

      - name: Regenerate latest.yml with signed installer hashes
        if: env.SIGNPATH_API_TOKEN != ''
        # electron-updater valide le sha512 du .exe contre celui de latest.yml.
        # Apres signature, le .exe a change => il faut regenerer latest.yml.
        shell: bash
        run: node scripts/regen-latest-yml.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AgentDockyard ${{ github.ref_name }}
          body: |
            **AgentDockyard ${{ github.ref_name }}**

            See [CHANGELOG.md](https://github.com/steevec/agentdockyard/blob/main/CHANGELOG.md) for the full release notes.

            ### Download

            - **Installer** : `AgentDockyard-Setup-*.exe` (recommended - creates desktop/start-menu shortcuts)
            - **Portable** : `AgentDockyard-Portable-*.exe` (no install, just run)

            Windows SmartScreen may warn on first launch as the installer is not code-signed yet.

            ### Auto-update

            Existing installations update automatically from this release.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/AgentDockyard-Setup-*.exe
            dist/AgentDockyard-Portable-*.exe
            dist/AgentDockyard-Setup-*.exe.blockmap
            dist/latest.yml

      - name: Upload build artefacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14
