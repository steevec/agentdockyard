name: Release

# Declenche un build + release complet des qu'un tag vX.Y.Z est pousse.
# Le tag doit correspondre exactement a la version du package.json.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # necessaire pour creer la release et uploader les assets

jobs:
  release:
    name: Build & publish installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Install npm dependencies
        run: npm ci

      - name: Build agent.exe (PyInstaller)
        run: npm run build:agent

      - name: Build Electron installer + portable (no publish)
        env:
          # Pas de signature en v1 (pas de cert). Empeche electron-builder d essayer.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # --publish never : on laisse la step suivante publier la release
        # (electron-builder creerait sinon une release en mode draft).
        run: npx electron-builder --win --publish never

      - name: List build artefacts
        shell: bash
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AgentDockyard ${{ github.ref_name }}
          body: |
            **AgentDockyard ${{ github.ref_name }}**

            See [CHANGELOG.md](https://github.com/steevec/agentdockyard/blob/main/CHANGELOG.md) for the full release notes.

            ### Download

            - **Installer** : `AgentDockyard-Setup-*.exe` (recommended - creates desktop/start-menu shortcuts)
            - **Portable** : `AgentDockyard-Portable-*.exe` (no install, just run)

            Windows SmartScreen may warn on first launch as the installer is not code-signed yet.

            ### Auto-update

            Existing installations update automatically from this release.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/AgentDockyard-Setup-*.exe
            dist/AgentDockyard-Portable-*.exe
            dist/AgentDockyard-Setup-*.exe.blockmap
            dist/latest.yml

      - name: Upload build artefacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14
